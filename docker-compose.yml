version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: framekart-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: framekart

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: framekart-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - ./backend:/app
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: framekart-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    stdin_open: true

volumes:
  mongo_data:
